name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'imgs/'
  schedule:
    - cron: '0 4,10 * * *'
  watch:
    types: started

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: glados checkin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v5

    - name: set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # 安装 python 库
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    # 执行 签到脚本
    - name: running checkin
      run: |
        python checkin.py
      env:
        # env获取
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}

    - name: keep alive
      uses: liskin/gh-workflow-keepalive@v1 # using the workflow with default settings
      continue-on-error: true
      
    - name: delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      continue-on-error: true
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 10
        delete_run_by_conclusion_pattern: success
 
